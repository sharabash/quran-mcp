ic reference surface</div> <h1>Documentation</h1> <p class="tagline">Canonical Quran text, translations, and tafsir commentary, exposed through a read-only MCP server with grounded workflows, edition discovery, and word-level study tools.</p> <div class="hero-meta" aria-label="Documentation summary"><span>Scholar-grade depth</span> <span> </span> <span>Grounded and cited</span> <span>Word study tools</span> <span>Zero config</span></div></section> <section class="section reveal" id="setup-and-connect"><h2 class="section-heading">Setup and connect <a href="#setup-and-connect" class="anchor" aria-hidden="true">#</a></h2> <p class="section-blurb">Connect the Quran MCP server in under a minute. The information architecture stays simple on purpose: a fast overview first, then expandable client walkthroughs when you need screenshots and exact click paths.</p> <h3 class="cards-subheading" id="setup-at-a-glance">At a glance <a href="#setup-at-a-glance" class="anchor" aria-hidden="true">#</a></h3> <div class="install-grid"><div class="card install-card"><h3>Claude</h3> <p><strong>Settings</strong> &rarr; <strong>Connectors</strong> &rarr; <strong>Add custom connector</strong></p> <p>Name: <code>quran</code><br/>URL: <code>https://mcp.quran.ai</code></p></div> <div class="card install-card"><h3>ChatGPT</h3> <p><strong>Settings</strong> &rarr; <strong>Apps</strong> &rarr; <strong>Advanced</strong> &rarr; Developer mode &rarr; <strong>Create app</strong></p> <p>Name: <code>quran</code><br/>URL: <code>https://mcp.quran.ai</code><br/>Auth: none</p> <p>Invoke with <code>@quran</code> in chat.</p></div> <div class="card install-card"><h3>Other MCP clients</h3> <p>Look for MCP, app, or connector settings. Use the server name <code>quran</code>, point it at <code>https://mcp.quran.ai/</code>, and keep transport on <code>streamable-http</code>. If your client expects a JSON connection object, start from this shape:</p> <div class="code-block" style="margin-top:12px"><div class="code-label">Connection object</div> <pre><code></code></pre> <button class="copy-btn" type="button">copy</button></div></div></div> <p class="section-blurb" style="margin-top:14px">Naming the server <code>quran</code> makes it easier for clients to discover and invoke the right tool surface. The public endpoint uses Streamable HTTP and does not require an API key.</p> <h3 class="cards-subheading setup-heading-sticky" id="setup-claude">Claude <span class="platform-tags"><span>Web</span> <span>Desktop</span></span><button class="collapse-top-toggle" type="button" hidden="" data-collapsible-toggle="" data-target="claude-setup-collapsible">Collapse guide</button><a href="#setup-claude" class="anchor" aria-hidden="true">#</a></h3> <div class="setup-collapsible docs-collapsible" id="claude-setup-collapsible" data-collapsible="" data-collapsed-max="31rem" data-auto-collapse="always"><div class="setup-guide reveal"><p class="setup-intro">Requires a <a href="https://claude.ai" style="color:var(--link)">Claude subscription</a> (Pro, Team, or Enterprise).</p> <p class="setup-phase">One-time setup</p> <div class="setup-steps"><div class="setup-step"><span class="step-num">1</span> <div class="step-body"><h4>Open Connectors</h4> <p>Go to <strong>Settings &rarr; Connectors</strong>. You'll see a banner that connectors have moved. Click <strong>Go to Customize</strong>.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/claude1.png" alt="Claude Settings showing the Connectors page with a Go to Customize banner" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">2</span> <div class="step-body"><h4>Add custom connector</h4> <p>In the Customize panel, click the <strong>+</strong> button next to Connectors, then select <strong>Add custom connector</strong>.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/claude2.png" alt="Customize panel showing the Add custom connector option in the dropdown" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">3</span> <div class="step-body"><h4>Configure the server</h4> <p>Set <strong>Name</strong> to <code>quran</code> and paste the server URL into <strong>Remote MCP server URL</strong>, then click <strong>Add</strong>.</p> <div class="code-block" style="margin-top:12px"><div class="code-label">Remote MCP server URL</div> <pre><code>https://mcp.quran.ai</code></pre> <button class="copy-btn" type="button">copy</button></div> <img class="setup-screenshot" data-deferred-src="/screenshots/new/claude3.png" alt="Add custom connector dialog with name and URL filled in" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">4</span> <div class="step-body"><h4>Allow all tools</h4> <p>Open the connector you just added and set every tool to <strong>Always allow</strong>. They're all read-only.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/claude4.png" alt="Tool permissions showing Always allow selected for all read-only tools" loading="lazy"/></div></div></div> <p class="setup-phase">Every conversation</p> <div class="setup-steps"><div class="setup-step"><span class="step-num">5</span> <div class="step-body"><h4>Start a conversation</h4> <p>Open a new chat. Click <strong>+</strong> &rarr; <strong>Connectors</strong> and make sure <strong>quran</strong> is enabled before sending your question.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/claude5.png" alt="New chat with Connectors menu showing quran toggle enabled" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">6</span> <div class="step-body"><h4>Check for tool calls</h4> <p>Look for tool-call indicators in the response. That is the fast sanity check that Claude fetched canonical data instead of free-styling from memory.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/claude6.png" alt="Claude response showing tool calls to the Quran MCP server" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">7</span> <div class="step-body"><h4>Verify citations</h4> <p>Look for inline citations and summary attribution. Those are the visible signals that the answer stayed grounded in fetched sources.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/claude7.png" alt="Claude response with inline citations and source attribution" loading="lazy"/></div></div></div></div></div> <button class="collapse-toggle" type="button" hidden="" data-collapsible-toggle="" data-target="claude-setup-collapsible" data-show-label="Show full guide" data-hide-label="Collapse guide">Show full guide</button> <h3 class="cards-subheading setup-heading-sticky" id="setup-chatgpt">ChatGPT <span class="platform-tags"><span>Web</span> <span>Desktop</span> <span>Mobile</span></span><button class="collapse-top-toggle" type="button" hidden="" data-collapsible-toggle="" data-target="chatgpt-setup-collapsible">Collapse guide</button><a href="#setup-chatgpt" class="anchor" aria-hidden="true">#</a></h3> <div class="setup-collapsible docs-collapsible" id="chatgpt-setup-collapsible" data-collapsible="" data-collapsed-max="31rem" data-auto-collapse="always"><div class="setup-guide reveal"><p class="setup-intro">Requires a <a href="https://chatgpt.com" style="color:var(--link)">ChatGPT subscription</a>. Set up on Web or Desktop once and it syncs to Mobile automatically.</p> <p class="setup-phase">One-time setup</p> <div class="setup-steps"><div class="setup-step"><span class="step-num">1</span> <div class="step-body"><h4>Open app settings</h4> <p>Go to <strong>Settings &rarr; Apps</strong>, then open <strong>Advanced settings</strong> at the bottom.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/chatgpt-1-apps.png" alt="ChatGPT Settings showing Apps tab with Advanced settings at the bottom" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">2</span> <div class="step-body"><h4>Enable developer mode</h4> <p>Turn on <strong>Developer mode</strong>. A <strong>Create app</strong> button appears in the top-right corner.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/chatgpt-2-devmode.png" alt="Developer mode toggled on with ELEVATED RISK badge, Create app button visible" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">3</span> <div class="step-body"><h4>Create the app</h4> <p>Set <strong>Name</strong> to <code>quran</code>, paste the server URL into <strong>MCP Server URL</strong>, leave authentication on <strong>No Auth</strong>, then click <strong>Create</strong>.</p> <div class="code-block" style="margin-top:12px"><div class="code-label">MCP server URL</div> <pre><code>https://mcp.quran.ai</code></pre> <button class="copy-btn" type="button">copy</button></div> <img class="setup-screenshot" data-deferred-src="/screenshots/new/chatgpt-3-form.png" alt="New App form with name quran, MCP Server URL filled in, No Auth selected, acknowledgment checked" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">4</span> <div class="step-body"><h4>Verify it connected</h4> <p>You'll land back on the Apps page. <strong>quran</strong> should appear under <strong>Enabled apps</strong> with the <strong>DEV</strong> badge.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/chatgpt-4-enabled-apps.png" alt="Apps page showing quran listed under Enabled apps with DEV badge" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">5</span> <div class="step-body"><h4>Check app details</h4> <p>Open the <strong>quran</strong> entry and enable <strong>Reference memories and chats</strong> so the app can reason with conversation context while still grounding on canonical data.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/chatgpt-5-memory-on.png" alt="App details showing Reference memories toggle, connection URL, and tool list" loading="lazy"/></div></div></div> <p class="setup-phase">Every conversation</p> <div class="setup-steps"><div class="setup-step"><span class="step-num">6</span> <div class="step-body"><h4>Attach the app</h4> <p>In any chat, click <strong>+</strong> &rarr; <strong>More</strong> and select <strong>quran</strong>. The badge appears in the input bar.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/chatgpt-6-use-app.png" alt="Chat input plus menu expanded, showing quran app at the bottom of the More submenu" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">7</span> <div class="step-body"><h4>Ask your question</h4> <p>Ask naturally. The app decides whether it needs exact text, translations, tafsir, or search based on the question itself.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/chatgpt-7-just-ask.png" alt="Chat input with a multi-part question about the quran app's purpose and capabilities" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">8</span> <div class="step-body"><h4>Read the grounded response</h4> <p>Look for the <strong>Called tool</strong> indicators. That is the evidence path that the response is using server data rather than memory alone.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/chatgpt-8-response.png" alt="ChatGPT response explaining the quran app as a scholarly research tool, with Called tool indicator" loading="lazy"/></div></div></div> <p class="setup-phase">Getting better results</p> <div class="setup-steps"><div class="setup-step"><span class="step-num">9</span> <div class="step-body"><h4>Turn on Thinking mode</h4> <p>Use <strong>Thinking</strong> for multi-step or comparative questions. It helps ChatGPT choose editions more deliberately and sequence tool calls with fewer shortcuts.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/chatgpt-9-turn-on-thinking.png" alt="ChatGPT model picker showing Thinking mode selected" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">10</span> <div class="step-body"><h4>Ask deeper questions</h4> <p>With Thinking mode enabled, ChatGPT is more likely to compare available mufassirin and choose editions that match the question rather than defaulting to the first available source.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/chatgpt-10-list-editions.png" alt="Prompt asking about available tafsir and their strengths, with Extended thinking and quran badges" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">11</span> <div class="step-body"><h4>Inspect tool calls</h4> <p>Expand each tool call to see which verses, parameters, and editions were used. Multiple calls usually means the answer is doing real synthesis.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/chatgpt-11-look-for-tool-calls.png" alt="Response showing multiple Called tool indicators with fetch_translation and fetch_tafsir requests visible" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">12</span> <div class="step-body"><h4>Check the citation line</h4> <p>Look for the <strong>Grounded with quran.ai</strong> line at the bottom. That gives you the exact trail of tool calls and editions used in the answer.</p> <img class="setup-screenshot" data-deferred-src="/screenshots/new/chatgpt-12-look-for-citation.png" alt="Citation line reading Grounded with quran.ai followed by a list of fetch_quran, fetch_translation, and fetch_tafsir calls" loading="lazy"/></div></div></div></div></div> <button class="collapse-toggle" type="button" hidden="" data-collapsible-toggle="" data-target="chatgpt-setup-collapsible" data-show-label="Show full guide" data-hide-label="Collapse guide">Show full guide</button> <h3 class="cards-subheading" id="setup-other-clients">Other MCP clients <a href="#setup-other-clients" class="anchor" aria-hidden="true">#</a></h3> <div class="card install-card reveal"><h4>Generic MCP connection</h4> <p>Any MCP-compatible client can connect over Streamable HTTP. Use the server name <code>quran</code>, point it at <code>https://mcp.quran.ai/</code>, and pass the same JSON object shown above when the client wants structured configuration instead of form fields.</p></div></section> <section class="section reveal" id="usage-examples"><h2 class="section-heading">Usage examples <a href="#usage-examples" class="anchor" aria-hidden="true">#</a></h2> <!></section> <section class="section reveal" id="available-tools"><h2 class="section-heading">Tool reference <a href="#available-tools" class="anchor" aria-hidden="true">#</a></h2> <p class="section-blurb"> </p> <div class="tool-grid"></div></section> <!> <section class="section reveal section-transition" id="editions"><h2 class="section-heading">Supported editions <a href="#editions" class="anchor" aria-hidden="true">#</a></h2> <p class="section-blurb">The edition table is intentionally literal. Use the exact <code>edition_id</code> values below when you want deterministic control over translation or tafsir selection.</p> <!></section> <section class="section reveal" id="troubleshooting"><h2 class="section-heading">Troubleshooting <a href="#troubleshooting" class="anchor" aria-hidden="true">#</a></h2> <div class="troubleshoot-grid"><div class="troubleshoot-card"><h4>Server naming and invocation</h4> <p>Use <code>quran</code> as the server name. In ChatGPT, invoke with <code>@quran</code>. In Claude, enable it from the Connectors menu before you send the prompt.</p></div> <div class="troubleshoot-card"><h4>Did it actually call the tools?</h4> <p>Look for explicit tool calls like <code>fetch_quran</code> or <code>search_tafsir</code>. If you do not see calls, the answer may be running from model memory instead of fetched data.</p></div> <div class="troubleshoot-card"><h4>Did it stay inside the sources?</h4> <p>The server is a study surface, not a replacement for independent scholarly judgment. If the answer makes a strong claim, ask it to point back to the exact fetched text.</p></div> <div class="troubleshoot-card"><h4>Does it cite what it used?</h4> <p>Grounded responses should expose the trail of tool calls and editions. Missing attribution is often the first sign that the client is answering too loosely.</p></div> <div class="troubleshoot-card"><h4>Grounding rules bloat</h4> <p>Call <code>fetch_grounding_rules()</code> once per session. That suppresses repeated grounding payloads in later canonical responses and saves tokens.</p></div> <div class="troubleshoot-card"><h4>Edition ID not found</h4> <p>Call <code>list_editions()</code> first to get exact selectors. Edition matching supports full IDs, short codes, language codes, and fuzzy matches, but exact IDs are safest.</p></div></div></section> <section class="section reveal" id="notes"><h2 class="section-heading">Notes <a href="#notes" class="anchor" aria-hidden="true">#</a></h2> <ul class="notes-list"><li><strong>Example convention</strong> Examples show the exact <code>structuredContent</code> payload shape for the checked-in fixture call. The repeated <code>grounding_rules</code> field is typically null because <code>fetch_grounding_rules()</code> was already called earlier in the session.</li> <li><strong>Required vs optional</strong> Required fields are marked directly in the parameter table. Nullable types such as <code>string | null</code> still accept null to skip or defer to defaults.</li> <li><strong>Display trimming</strong> Long string fields are shortened after 256 characters, and long lists of rich objects are shown as first item, ellipsis, last item, so the response examples stay readable without pretending to be the full payload.</li> <li><strong>Mushaf coupling</strong> <code>show_mushaf</code> is the human-facing tool. <code>fetch_mushaf</code> exposes the rendering payload that hosts use to power the same surface behind the scenes.</li> <li><strong>Production surface</strong> This page r
