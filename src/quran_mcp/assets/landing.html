unding</span> <span>Uncertain training data, paraphrased verses, hallucinated references</span></div> <div class="contrast-arrow">&rarr;</div> <div class="contrast-box after"><span class="contrast-label">With quran.ai</span> Grounded answers backed by verified text, tafsir, and translations from quran.com</div></div> <div class="card url-card"><h2>Server URL</h2> <div class="url-bar"><code>https://mcp.quran.ai/</code> <button title="Copy to clipboard"><!></button></div> <p>Connect this MCP server to <a href="#setup-claude">Claude</a> or <a href="#setup-chatgpt">ChatGPT</a>, or any AI client that supports MCP.
      When the AI calls our server, responses are grounded in verified data from <a href="https://quran.com">quran.com</a>, <b>not</b> hallucinated, <em class="inshallah">insha'Allah.</em></p></div> <div class="card"><h2>How It Works</h2> <div class="how-steps"><div class="how-step"><span class="how-step-num">1</span> <div class="how-step-text"><strong>You ask the AI about the Quran.</strong> A focused tafsir deep-dive, a verse lookup, a thematic search &mdash; anything.</div></div> <div class="how-step"><span class="how-step-num">2</span> <div class="how-step-text"><strong>The AI calls quran.ai to retrieve verified sources</strong> &mdash; classical tafsir commentary, canonical Arabic text, and translations all sourced from <a href="https://quran.com">quran.com</a>.</div></div> <div class="how-step"><span class="how-step-num">3</span> <div class="how-step-text"><strong>The AI grounds its response strictly in the retrieved content.</strong> The source data is verified and canonical. The AI is instructed to stay within what the sources say, and <a href="#setup-claude">Claude</a> does so reliably &mdash; from quick verse lookups to deep scholarly study, but <a href="#disclaimer">read the fine print</a> to know how to spot if the AI isn't doing its job.</div></div></div></div> <section id="setup-glance"><hr class="section-rule"/> <h2 class="section-heading">Setup at a glance</h2> <div class="install-grid"><div class="card install-card"><h3><a href="#setup-claude">Claude</a></h3> <p><strong>Settings</strong> &rarr; <strong>Connectors</strong> &rarr; <strong>Add custom connector</strong></p> <dl class="field-list"><dt>Name</dt><dd><code>quran</code></dd> <dt>URL</dt><dd><code>https://mcp.quran.ai</code></dd></dl></div> <div class="card install-card"><h3><a href="#setup-chatgpt">ChatGPT</a></h3> <p><strong>Settings</strong> &rarr; <strong>Apps</strong>, then<br/><strong>Advanced</strong> &rarr; Developer mode &rarr; <strong>Create app</strong></p> <dl class="field-list"><dt>Name</dt><dd><code>quran</code></dd> <dt>URL</dt><dd><code>https://mcp.quran.ai</code></dd> <dt>Auth</dt><dd><code>none</code></dd></dl> <p class="invoke-hint">Invoke with <code>@quran</code> in chat.</p></div> <div class="card install-card install-card-generic"><h3>Other MCP clients</h3> <p>Use the server name <code>quran</code>, point it at <code>https://mcp.quran.ai/</code>, and keep transport on <code>streamable-http</code>. If your client expects a JSON connection object, start from this shape:</p> <!></div></div></section> <section id="setup"><p class="section-blurb" style="margin-bottom:16px">Need the full walkthrough with screenshots? Pick your client below. <a href="#setup-claude">Claude</a> or <a href="#setup-chatgpt">ChatGPT</a>.</p> <div class="card setup-card" id="setup-claude"><h3 class="setup-platform-heading">Claude <span class="platform-tags"><span>Web</span> <span>Desktop</span></span></h3> <p class="setup-intro">Requires a <a href="https://claude.ai">Claude subscription</a> (Pro, Team, or Enterprise).</p> <div class="docs-collapsible" id="claude-setup-collapsible" data-collapsible="" data-collapsed-max="31rem" data-auto-collapse="always" data-scroll-target="setup-claude"><p class="setup-phase">One-time setup</p> <div class="setup-steps"><div class="setup-step"><span class="step-num">1</span> <div class="step-body"><h4>Open Connectors</h4> <p>Go to <strong>Settings &rarr; Connectors</strong>. You'll see a banner that connectors have moved. Click <strong>Go to Customize</strong>.</p> <img class="setup-screenshot" src="/screenshots/new/claude1.png" alt="Claude Settings showing the Connectors page with a Go to Customize banner" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">2</span> <div class="step-body"><h4>Add custom connector</h4> <p>In the Customize panel, click the <strong>+</strong> button next to Connectors, then select <strong>Add custom connector</strong>.</p> <img class="setup-screenshot" src="/screenshots/new/claude2.png" alt="Customize panel showing the Add custom connector option in the dropdown" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">3</span> <div class="step-body"><h4>Configure the server</h4> <p>Set <strong>Name</strong> to <code>quran</code> and paste the server URL into <strong>Remote MCP server URL</strong>, then click <strong>Add</strong>.</p> <div class="code-block"><div class="code-label">Remote MCP server URL</div> <pre><code>https://mcp.quran.ai</code></pre></div> <img class="setup-screenshot" src="/screenshots/new/claude3.png" alt="Add custom connector dialog with name and URL filled in" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">4</span> <div class="step-body"><h4>Allow all tools</h4> <p>Open the connector you just added and set every tool to <strong>Always allow</strong>. They're all read-only.</p> <img class="setup-screenshot" src="/screenshots/new/claude4.png" alt="Tool permissions showing Always allow selected for all read-only tools" loading="lazy"/></div></div></div> <p class="setup-phase">Every conversation</p> <div class="setup-steps"><div class="setup-step"><span class="step-num">5</span> <div class="step-body"><h4>Start a conversation</h4> <p>Open a new chat. Click <strong>+</strong> &rarr; <strong>Connectors</strong> and make sure <strong>quran</strong> is enabled before sending your question.</p> <img class="setup-screenshot" src="/screenshots/new/claude5.png" alt="New chat with Connectors menu showing quran toggle enabled" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">6</span> <div class="step-body"><h4>Check for tool calls</h4> <p>Look for tool-call indicators in the response. That is the fast sanity check that Claude fetched canonical data instead of free-styling from memory.</p> <img class="setup-screenshot" src="/screenshots/new/claude6.png" alt="Claude response showing tool calls to the Quran MCP server" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">7</span> <div class="step-body"><h4>Verify citations</h4> <p>Look for inline citations and summary attribution. Those are the visible signals that the answer stayed grounded in fetched sources.</p> <img class="setup-screenshot" src="/screenshots/new/claude7.png" alt="Claude response with inline citations and source attribution" loading="lazy"/></div></div></div></div> <button class="collapse-toggle" aria-label="Show full Claude guide" data-collapsible-toggle="" data-target="claude-setup-collapsible" data-show-label="Show full Claude guide" data-hide-label="Collapse guide"></button></div> <div class="card setup-card" id="setup-chatgpt"><h3 class="setup-platform-heading">ChatGPT <span class="platform-tags"><span>Web</span> <span>Desktop</span> <span>Mobile</span></span></h3> <p class="setup-intro">Requires a <a href="https://chatgpt.com">ChatGPT subscription</a>. Set up on Web or Desktop once and it syncs to Mobile automatically.</p> <div class="docs-collapsible" id="chatgpt-setup-collapsible" data-collapsible="" data-collapsed-max="31rem" data-auto-collapse="always" data-scroll-target="setup-chatgpt"><p class="setup-phase">One-time setup</p> <div class="setup-steps"><div class="setup-step"><span class="step-num">1</span> <div class="step-body"><h4>Open app settings</h4> <p>Go to <strong>Settings &rarr; Apps</strong>, then open <strong>Advanced settings</strong> at the bottom.</p> <img class="setup-screenshot" src="/screenshots/new/chatgpt-1-apps.png" alt="ChatGPT Settings showing Apps tab with Advanced settings at the bottom" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">2</span> <div class="step-body"><h4>Enable developer mode</h4> <p>Turn on <strong>Developer mode</strong>. A <strong>Create app</strong> button appears in the top-right corner.</p> <img class="setup-screenshot" src="/screenshots/new/chatgpt-2-devmode.png" alt="Developer mode toggled on with Create app button visible" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">3</span> <div class="step-body"><h4>Create the app</h4> <p>Set <strong>Name</strong> to <code>quran</code>, paste the server URL into <strong>MCP Server URL</strong>, leave authentication on <strong>No Auth</strong>, then click <strong>Create</strong>.</p> <div class="code-block"><div class="code-label">MCP server URL</div> <pre><code>https://mcp.quran.ai</code></pre></div> <img class="setup-screenshot" src="/screenshots/new/chatgpt-3-form.png" alt="New App form with name quran, MCP Server URL filled in, No Auth selected" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">4</span> <div class="step-body"><h4>Verify it connected</h4> <p>You'll land back on the Apps page. <strong>quran</strong> should appear under <strong>Enabled apps</strong> with the <strong>DEV</strong> badge.</p> <img class="setup-screenshot" src="/screenshots/new/chatgpt-4-enabled-apps.png" alt="Apps page showing quran listed under Enabled apps with DEV badge" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">5</span> <div class="step-body"><h4>Check app details</h4> <p>Open the <strong>quran</strong> entry and enable <strong>Reference memories and chats</strong> so the app can reason with conversation context while still grounding on canonical data.</p> <img class="setup-screenshot" src="/screenshots/new/chatgpt-5-memory-on.png" alt="App details showing Reference memories toggle and tool list" loading="lazy"/></div></div></div> <p class="setup-phase">Every conversation</p> <div class="setup-steps"><div class="setup-step"><span class="step-num">6</span> <div class="step-body"><h4>Attach the app</h4> <p>In any chat, click <strong>+</strong> &rarr; <strong>More</strong> and select <strong>quran</strong>. The badge appears in the input bar.</p> <img class="setup-screenshot" src="/screenshots/new/chatgpt-6-use-app.png" alt="Chat input plus menu showing quran app" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">7</span> <div class="step-body"><h4>Ask your question</h4> <p>Ask naturally. The app decides whether it needs exact text, translations, tafsir, or search based on the question itself.</p> <img class="setup-screenshot" src="/screenshots/new/chatgpt-7-just-ask.png" alt="Chat input with a question about the Quran" loading="lazy"/></div></div> <div class="setup-step"><span class="step-num">8</span> <div class="step-body"><h4>Read the grounded response</h4> <p>Look for the <strong>Called tool</strong> indicators. That is the evidence path that the response is using server data rather than memory alone.</p> <img class="setup-screenshot" src="/screenshots/new/chatgpt-8-response.png" alt="ChatGPT response with Called tool indicator" loading="lazy"/></div></div></div></div> <button class="collapse-toggle" aria-label="Show full ChatGPT guide" data-collapsible-toggle="" data-target="chatgpt-setup-collapsible" data-show-label="Show full ChatGPT guide" data-hide-label="Collapse guide"></button></div> <p class="setup-done">That's it. You're connected. <a href="/documentation">Explore the full tool reference and showcases &rarr;</a></p></section> <!> <div class="card disclaimer" id="disclaimer"><h2>Disclaimer <span class="disclaimer-subtitle">(the fine print)</span></h2> <p>When the AI calls our tools, the data is verified and canonical. Two things to watch for:</p> <p><strong>Did it actually call the tools?</strong><br/> Look for tool calls like <em class="disclaimer-em">fetch_quran</em> or <em class="disclaimer-em">search_tafsir</em> before the response. No tool calls = not grounded. On ChatGPT, start your conversations by explicitly invoking the app using the @ prefix, e.g. <strong><code class="mention-white">@quran</code></strong>.</p> <p><strong>Did it stay within the sources?</strong><br/> The AI is instructed to ground strictly in Quran text, tafsir, and translation data. If you push into personal rulings or gray-area fiqh
